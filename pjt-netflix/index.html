<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOONA FLIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
:root {
  --bg: #141414;
  --red: #E50914;
  --white: #ffffff;
  --star: #f5c518;
  --card-w: 160px;
  --card-h: 240px;
  --radius: 4px;
  --gutter: 48px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  overflow-x: hidden;
}

/* ── Navbar ── */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px var(--gutter);
  transition: background 0.4s;
}

.navbar.scrolled {
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
}

.nav-logo {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 2px;
  cursor: pointer;
}

.nav-search {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: var(--radius);
  color: var(--white);
  font-size: 0.9rem;
  padding: 6px 14px;
  width: 220px;
  outline: none;
  transition: border 0.2s;
}

.nav-search::placeholder { color: rgba(255,255,255,0.5); }
.nav-search:focus { border-color: var(--white); }

/* ── Hero Banner ── */
.hero {
  position: relative;
  height: 100vh;
  background-size: cover;
  background-position: center top;
  display: flex;
  align-items: flex-end;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.85) 30%, transparent 100%),
              linear-gradient(to top, rgba(20,20,20,1) 0%, transparent 30%);
}

.hero-info {
  position: relative;
  z-index: 1;
  padding: 0 var(--gutter) 80px;
  max-width: 600px;
}

.hero-title {
  font-size: 3rem;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 12px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
}

.hero-rating {
  font-size: 1.1rem;
  color: var(--star);
  margin-bottom: 10px;
}

.hero-overview {
  font-size: 0.95rem;
  line-height: 1.6;
  color: rgba(255,255,255,0.85);
}

/* ── Movie Section & Row ── */
.movie-section {
  padding: 32px var(--gutter) 60px;
}

.section-title {
  font-size: 1.3rem;
  margin-bottom: 16px;
}

.row-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.movie-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scroll-behavior: smooth;
  padding: 24px 0;
  scrollbar-width: none;
}

.movie-row::-webkit-scrollbar { display: none; }

/* ── Scroll Buttons ── */
.scroll-btn {
  position: absolute;
  z-index: 10;
  background: rgba(0,0,0,0.7);
  border: none;
  color: var(--white);
  font-size: 2.5rem;
  cursor: pointer;
  padding: 8px 4px;
  height: 100%;
  transition: background 0.2s;
}

.scroll-btn:hover { background: rgba(0,0,0,0.95); }
.scroll-btn.left  { left: -36px; }
.scroll-btn.right { right: -36px; }

/* ── Movie Card ── */
.movie-card {
  position: relative;
  flex-shrink: 0;
  width: var(--card-w);
  height: var(--card-h);
  border-radius: var(--radius);
  overflow: visible;
  cursor: pointer;
  transition: transform 0.3s ease, z-index 0s;
  z-index: 1;
}

.movie-card:hover {
  transform: scale(1.3);
  z-index: 20;
}

.movie-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: var(--radius);
  display: block;
}

.card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 70%, transparent);
  padding: 10px 8px 8px;
  border-radius: 0 0 4px 4px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.movie-card:hover .card-info { opacity: 1; }

.card-title {
  font-size: 0.75rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.card-meta {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.75);
}

/* ── Error Message ── */
.error-msg {
  text-align: center;
  padding: 80px 20px;
  font-size: 1.1rem;
  color: rgba(255,255,255,0.6);
}

/* ── Placeholder (포스터 없을 때) ── */
.poster-placeholder {
  width: 100%;
  height: 100%;
  background: #333;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.4);
  text-align: center;
}
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-logo">NOONA FLIX</div>
    <input class="nav-search" id="searchInput" type="text" placeholder="영화 검색..." aria-label="영화 검색" />
  </nav>

  <!-- Hero Banner -->
  <section class="hero" id="hero" aria-label="추천 영화 배너">
    <div class="hero-overlay"></div>
    <div class="hero-info" id="heroInfo"></div>
  </section>

  <!-- Movie Row -->
  <section class="movie-section">
    <h2 class="section-title">🎬 현재 상영 중</h2>
    <div class="row-wrapper">
      <button class="scroll-btn left" id="scrollLeft" aria-label="이전">&#8249;</button>
      <div class="movie-row" id="movieRow"></div>
      <button class="scroll-btn right" id="scrollRight" aria-label="다음">&#8250;</button>
    </div>
  </section>

  <script>
    const API_KEY = '0fc5b4f8dc99f632e69a7e2971d00b5a';
    const API_URL = `https://api.themoviedb.org/3/movie/now_playing?api_key=${API_KEY}&language=ko-KR&page=1`;
    const IMG_BASE = 'https://image.tmdb.org/t/p/';

    let allMovies = [];

    async function fetchMovies() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('API 오류');
        const data = await res.json();
        allMovies = data.results;
        init(allMovies);
      } catch (err) {
        document.getElementById('movieRow').innerHTML =
          '<p class="error-msg">영화 정보를 불러오지 못했습니다.</p>';
        console.error(err);
      }
    }

    function renderHero(movie) {
      const hero = document.getElementById('hero');
      const heroInfo = document.getElementById('heroInfo');

      if (movie.backdrop_path) {
        hero.style.backgroundImage = `url(${IMG_BASE}original${movie.backdrop_path})`;
      }

      const overview = movie.overview
        ? movie.overview.slice(0, 150) + (movie.overview.length > 150 ? '...' : '')
        : '';

      const stars = '⭐'.repeat(Math.round(movie.vote_average / 2));

      heroInfo.innerHTML = `
        <h1 class="hero-title">${movie.title}</h1>
        <p class="hero-rating">${stars} ${movie.vote_average.toFixed(1)}</p>
        <p class="hero-overview">${overview}</p>
      `;
    }

    function init(movies) {
      if (!movies.length) return;
      renderHero(movies[0]);
      renderMovieRow(movies);
    }

    fetchMovies();
  </script>
</body>
</html>
